<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"/>
  <title>vStart</title>
  <script>
  (function () {
    const savedTheme = localStorage.getItem("theme");

   if (savedTheme === "dark") {
     document.write('<link rel="stylesheet" id="themeStylesheet" href="dark.css">');
    } else {
      document.write('<link rel="stylesheet" id="themeStylesheet" href="light.css">');
   }
  })();
  </script>
  <link rel="icon" type="image/svg+xml" href="favicon.png">
</head>
